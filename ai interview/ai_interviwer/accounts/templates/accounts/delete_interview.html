<!DOCTYPE html>
<html>
<head>
    <title>Delete Interview</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #eef2f3, #8e9eab);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding: 20px;
        }

        .delete-container {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            max-width: 500px;
            margin: auto;
            text-align: center;
        }

        h2 {
            font-weight: bold;
            color: #dc3545;
            margin-bottom: 20px;
        }

        p {
            font-size: 16px;
            color: #333;
            margin-bottom: 25px;
        }

        .btn-danger {
            background-color: #dc3545;
            border-color: #c82333;
        }

        .btn-secondary {
            background-color: #6c757d;
            border-color: #5a6268;
        }
    </style>
</head>
<body>
    <div class="delete-container">
        <h2>Delete Interview</h2>
        <p>
            Are you sure you want to delete the interview for 
            <b>{{ interview.candidate.username }}</b> - {{ interview.job_title }}?
        </p>

        <form method="post">
            {% csrf_token %}
            <div class="d-flex justify-content-center gap-3">
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
                <a href="{% url 'hr_dashboard' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
