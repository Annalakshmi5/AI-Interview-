<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
        }
        form {
            width: 300px;
            margin: auto;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 5px 0 15px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: blue;
            color: white;
            border: none;
        }
        .link {
            text-align: center;
            margin-top: 10px;
        }
        .success-message {
            color: green;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <h2 style="text-align:center;">Login</h2>

    <!-- ✅ MESSAGE BLOCK -->
    {% if messages %}
        <div class="success-message">
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>

    <div class="link">
        <p>Don't have an account? <a href="{% url 'signup' %}">Sign up here</a></p>
    </div>

</body>
</html>
